<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chá de Fralda do Dante 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#f7efe2;--gold:#c8922a;--gold-light:#e8b84b;
      --terracotta:#c4714a;--sage:#7d9b76;--sage-light:#a8bf9e;
      --dusty-rose:#c98b85;--brown:#5c3d1e;--brown-light:#7a5230;--dark:#2e1f0e;
      --sky-top:#d4eef7;--sky-mid:#e8f4fb;--sky-low:#f3f8fc;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden;}

    /* ── SKY BACKGROUND ── */
    .sky-bg {
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background: linear-gradient(180deg,
        #b8d8ec 0%,
        #cce5f3 18%,
        #deeef7 35%,
        #edf6fb 52%,
        #f5f9f5 70%,
        #f7f2ea 100%
      );
    }

    /* ── FULL SUN (background, behind clouds) ── */
    .sun-container {
      position:fixed;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 320px;
      z-index: 1;
      pointer-events:none;
    }
    .sun-body {
      position:absolute;
      bottom:0; left:50%;
      transform:translateX(-50%);
      width:220px;height:220px;
      border-radius:50%;
      background: radial-gradient(circle at 42% 42%,
        #fff5c0 0%, #ffd84a 22%, #f5a820 50%, #e07810 75%, #c85c08 100%
      );
      box-shadow:
        0 0 60px 20px rgba(245,168,32,.6),
        0 0 120px 40px rgba(240,140,20,.35),
        0 0 200px 80px rgba(200,120,10,.18);
      animation: sunPulse 5s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100%{box-shadow:0 0 60px 20px rgba(245,168,32,.6),0 0 120px 40px rgba(240,140,20,.35),0 0 200px 80px rgba(200,120,10,.18);}
      50%{box-shadow:0 0 80px 28px rgba(245,168,32,.75),0 0 150px 55px rgba(240,140,20,.45),0 0 240px 100px rgba(200,120,10,.25);}
    }
    /* Sun rays */
    .sun-rays {
      position:absolute;
      bottom:0;left:50%;
      transform:translateX(-50%);
      width:220px;height:220px;
      animation: raysRotate 18s linear infinite;
    }
    @keyframes raysRotate { from{transform:translateX(-50%) rotate(0deg)} to{transform:translateX(-50%) rotate(360deg)} }
    .ray {
      position:absolute;
      bottom:50%; left:50%;
      transform-origin:0 0;
      width:130px; height:10px;
      border-radius:5px;
      background:linear-gradient(90deg,rgba(255,220,80,.9),rgba(255,200,50,.0));
    }

    /* ── BACKGROUND CLOUDS (behind card) ── */
    .clouds-layer {
      position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;
    }
    .cld {
      position:absolute;
      pointer-events:none;
    }
    /* Cloud shape via multiple box-shadows / border-radius */
    .cld-shape {
      background:white;
      border-radius:50px;
      position:relative;
      filter:drop-shadow(0 4px 12px rgba(180,210,240,.4));
    }
    .cld-shape::before, .cld-shape::after {
      content:'';position:absolute;background:white;border-radius:50%;
    }

    /* Big fluffy clouds */
    .cloud-big .cld-shape { width:220px;height:70px; }
    .cloud-big .cld-shape::before { width:110px;height:90px;top:-42px;left:30px; }
    .cloud-big .cld-shape::after  { width:80px;height:70px;top:-32px;left:110px; }

    .cloud-med .cld-shape { width:150px;height:50px; }
    .cloud-med .cld-shape::before { width:80px;height:68px;top:-32px;left:18px; }
    .cloud-med .cld-shape::after  { width:58px;height:52px;top:-24px;left:78px; }

    .cloud-sm .cld-shape { width:100px;height:36px; }
    .cloud-sm .cld-shape::before { width:54px;height:48px;top:-22px;left:12px; }
    .cloud-sm .cld-shape::after  { width:40px;height:36px;top:-16px;left:52px; }

    /* Individual cloud instances */
    .cl1 { top:8%;  left:-18%; animation: cloudDrift1 60s linear infinite; opacity:.92; }
    .cl2 { top:18%; left:-14%; animation: cloudDrift1 80s linear infinite; opacity:.78; animation-delay:-25s; }
    .cl3 { top:32%; left:-20%; animation: cloudDrift1 70s linear infinite; opacity:.65; animation-delay:-44s; }
    .cl4 { top:48%; left:-16%; animation: cloudDrift1 90s linear infinite; opacity:.55; animation-delay:-10s; }
    .cl5 { top:62%; left:-12%; animation: cloudDrift1 75s linear infinite; opacity:.45; animation-delay:-58s; }
    .cl6 { top:76%; left:-22%; animation: cloudDrift1 85s linear infinite; opacity:.38; animation-delay:-33s; }

    .cl7  { top:5%;  right:-18%; animation: cloudDrift2 65s linear infinite; opacity:.85; animation-delay:-8s; }
    .cl8  { top:22%; right:-14%; animation: cloudDrift2 78s linear infinite; opacity:.72; animation-delay:-35s; }
    .cl9  { top:40%; right:-20%; animation: cloudDrift2 68s linear infinite; opacity:.58; animation-delay:-50s; }
    .cl10 { top:58%; right:-16%; animation: cloudDrift2 88s linear infinite; opacity:.48; animation-delay:-20s; }
    .cl11 { top:72%; right:-12%; animation: cloudDrift2 72s linear infinite; opacity:.40; animation-delay:-62s; }

    @keyframes cloudDrift1 { from{transform:translateX(0)} to{transform:translateX(140vw)} }
    @keyframes cloudDrift2 { from{transform:translateX(0)} to{transform:translateX(-140vw)} }

    /* ── FOREGROUND CLOUD FLOOR (card sits on clouds) ── */
    .cloud-floor {
      position:fixed;
      bottom:-20px; left:-5%;
      width:110%;
      height:220px;
      z-index:3;
      pointer-events:none;
    }
    .cloud-floor svg { width:100%;height:100%; }

    /* ── FLOATING PARTICLES ── */
    .particles { position:fixed;inset:0;z-index:2;pointer-events:none; }
    .particle {
      position:absolute;
      border-radius:50%;
      animation: particleFloat linear infinite;
      opacity:0;
    }
    @keyframes particleFloat {
      0%   { transform:translateY(100vh) scale(0); opacity:0; }
      10%  { opacity:.6; }
      90%  { opacity:.3; }
      100% { transform:translateY(-20vh) scale(1.2); opacity:0; }
    }

    .leaf-float { position:fixed;pointer-events:none;z-index:2;opacity:.08;font-size:3.5rem; }

    /* ── PAGES ── */
    .page{position:relative;z-index:4;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
    .page.active{display:flex;}

    /* ── CARD ── */
    .invite-card,.rsvp-card{
      background:rgba(255,253,248,.96);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1.5px solid rgba(200,146,42,.22);
      border-radius:28px;
      box-shadow:
        0 20px 60px rgba(94,61,30,.14),
        0 8px 24px rgba(94,61,30,.08),
        0 0 0 1px rgba(255,255,255,.7) inset,
        0 2px 0 rgba(255,255,255,.9) inset;
      width:100%;position:relative;overflow:hidden;
    }
    .invite-card{max-width:400px;padding:36px 32px 42px;text-align:center;}
    .rsvp-card{max-width:480px;padding:36px 28px 32px;}
    .invite-card::before,.rsvp-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:5px;
      background:linear-gradient(90deg,var(--sage),var(--gold),var(--terracotta),var(--dusty-rose),var(--gold-light),var(--sage));
    }

    /* card cloud bottom edge */
    .invite-card::after {
      content:'';position:absolute;bottom:-1px;left:0;right:0;height:18px;
      background:rgba(255,253,248,.96);
      border-radius:0 0 28px 28px;
    }

    .corner-deco{position:absolute;width:72px;opacity:.14;}
    .corner-deco.tl{top:14px;left:14px;}
    .corner-deco.br{bottom:14px;right:14px;transform:rotate(180deg);}

    /* ── INLINE SUN (on card) ── */
    .card-sun-scene {
      width:180px;height:130px;
      margin:0 auto 10px;
      position:relative;
      overflow:visible;
    }
    .card-sun-glow {
      position:absolute;
      bottom:20px;left:50%;
      transform:translateX(-50%);
      width:86px;height:86px;
      border-radius:50%;
      background:radial-gradient(circle at 42% 42%,
        #fff5c0 0%,#ffd84a 25%,#f5a820 55%,#e07810 80%,#c85c08 100%
      );
      box-shadow:0 0 28px 8px rgba(245,168,32,.55),0 0 56px 18px rgba(240,140,20,.28);
      animation:sunPulse 5s ease-in-out infinite;
      z-index:2;
    }
    .card-sun-rays-wrap {
      position:absolute;
      bottom:20px;left:50%;
      transform:translateX(-50%);
      width:86px;height:86px;
      z-index:1;
      animation:raysRotate 18s linear infinite;
    }
    .card-ray {
      position:absolute;
      bottom:50%;left:50%;
      transform-origin:0 0;
      width:58px;height:5px;
      border-radius:3px;
      background:linear-gradient(90deg,rgba(255,210,70,.85),transparent);
    }
    /* cloud overlay on card sun */
    .card-sun-clouds {
      position:absolute;
      bottom:0;left:50%;
      transform:translateX(-50%);
      width:200px;height:52px;
      z-index:3;
    }
    .csc {
      position:absolute;
      background:rgba(255,253,248,.97);
      border-radius:50%;
    }
    .csc1{width:72px;height:50px;bottom:-8px;left:-4px;}
    .csc2{width:58px;height:44px;bottom:2px;left:40px;}
    .csc3{width:68px;height:48px;bottom:-4px;left:78px;}
    .csc4{width:54px;height:40px;bottom:3px;left:116px;}
    .csc5{width:62px;height:46px;bottom:-6px;left:148px;}

    /* ── INVITE TEXT ── */
    .invite-pretitle{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-style:italic;color:var(--sage);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;}
    .invite-title{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;color:var(--brown);line-height:1.2;margin-bottom:2px;}
    .invite-name{font-family:'Playfair Display',serif;font-size:3.4rem;font-weight:600;font-style:italic;color:var(--gold);line-height:1.05;margin-bottom:8px;text-shadow:0 2px 12px rgba(200,146,42,.25);letter-spacing:-.5px;}
    .invite-msg{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--brown-light);line-height:1.65;margin-bottom:4px;}
    .boho-divider{display:flex;align-items:center;gap:10px;margin:13px auto;}
    .boho-divider::before,.boho-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,146,42,.42),transparent);}
    .boho-divider span{color:var(--gold);font-size:.85rem;}

    /* ── ACTION BUTTONS ── */
    .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
    .action-btn{display:flex;flex-direction:column;align-items:center;gap:9px;padding:20px 14px;border-radius:20px;border:none;cursor:pointer;transition:all .3s ease;text-decoration:none;position:relative;overflow:hidden;}
    .action-btn::after{content:'';position:absolute;inset:0;border-radius:20px;opacity:0;transition:opacity .3s;background:rgba(255,255,255,.14);}
    .action-btn:hover::after{opacity:1;}
    .action-btn:hover{transform:translateY(-3px);}
    .action-btn:active{transform:translateY(0);}
    .action-btn.confirmar{background:linear-gradient(145deg,var(--terracotta),#d4907a);box-shadow:0 5px 20px rgba(196,113,74,.38);}
    .action-btn.confirmar:hover{box-shadow:0 8px 28px rgba(196,113,74,.52);}
    .action-btn.localizacao{background:linear-gradient(145deg,var(--sage),var(--sage-light));box-shadow:0 5px 20px rgba(125,155,118,.38);}
    .action-btn.localizacao:hover{box-shadow:0 8px 28px rgba(125,155,118,.52);}
    .action-icon{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.24);display:flex;align-items:center;justify-content:center;font-size:1.8rem;backdrop-filter:blur(4px);}
    .action-label{font-family:'Playfair Display',serif;font-size:.98rem;font-weight:700;color:white;letter-spacing:.2px;}
    .action-sublabel{font-family:'Lato',sans-serif;font-size:.7rem;color:rgba(255,255,255,.82);}

    /* ── RSVP ── */
    .back-btn{display:inline-flex;align-items:center;gap:6px;font-family:'Lato',sans-serif;font-size:.78rem;font-weight:700;color:var(--brown-light);background:rgba(200,146,42,.1);border:1px solid rgba(200,146,42,.2);border-radius:20px;padding:6px 14px;cursor:pointer;margin-bottom:20px;transition:all .2s;text-transform:uppercase;letter-spacing:.3px;}
    .back-btn:hover{background:rgba(200,146,42,.18);transform:translateX(-2px);}
    .rsvp-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--brown);margin-bottom:2px;}
    .rsvp-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--terracotta);font-size:1rem;margin-bottom:14px;}
    .form-label{display:block;font-family:'Lato',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--brown);margin-bottom:6px;}
    input[type="text"]{background:rgba(237,223,200,.38);border:1.5px solid rgba(200,146,42,.28);border-radius:10px;padding:12px 14px;width:100%;font-family:'Lato',sans-serif;font-size:.95rem;color:var(--dark);transition:border-color .2s,box-shadow .2s;outline:none;}
    input[type="text"]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,42,.12);}
    input[type="text"]::placeholder{color:#c0a882;}
    .cat-block{border:1.5px solid rgba(200,146,42,.18);border-radius:12px;overflow:hidden;background:rgba(247,239,226,.48);transition:box-shadow .2s;}
    .cat-block:hover{box-shadow:0 2px 12px rgba(200,146,42,.1);}
    .cat-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;background:transparent;border:none;cursor:pointer;transition:background .2s;}
    .cat-toggle:hover{background:rgba(200,146,42,.06);}
    .cat-toggle-left{display:flex;align-items:center;gap:8px;}
    .cat-name{font-family:'Lato',sans-serif;font-size:.85rem;font-weight:700;color:var(--brown);}
    .cat-count{font-family:'Cormorant Garamond',serif;font-size:.82rem;font-style:italic;color:#a08060;}
    .cat-arrow{font-size:.68rem;color:var(--gold);transition:transform .3s ease;}
    .cat-arrow.open{transform:rotate(180deg);}
    .cat-panel{overflow:hidden;max-height:0;opacity:0;transition:max-height .4s ease,opacity .3s ease;padding:0 12px;}
    .cat-panel.open{max-height:600px;opacity:1;padding:4px 12px 10px;}
    .tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
    .tag-rn{background:rgba(184,134,11,.13);color:#9a7010;border:1px solid rgba(184,134,11,.28);}
    .tag-p{background:rgba(201,139,133,.13);color:#a05a55;border:1px solid rgba(201,139,133,.28);}
    .tag-m{background:rgba(125,155,118,.13);color:#4a7a43;border:1px solid rgba(125,155,118,.28);}
    .tag-g{background:rgba(196,113,74,.13);color:#8b4020;border:1px solid rgba(196,113,74,.28);}
    .items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .item-btn{padding:8px 5px;border-radius:9px;border:1.5px solid transparent;font-family:'Lato',sans-serif;font-size:.75rem;font-weight:600;text-align:center;cursor:pointer;transition:all .2s ease;line-height:1.3;}
    .item-btn.available{background:linear-gradient(135deg,rgba(232,213,183,.5),rgba(247,239,226,.9));border-color:rgba(200,146,42,.22);color:var(--brown);}
    .item-btn.available:hover{background:linear-gradient(135deg,rgba(200,146,42,.14),rgba(201,139,133,.18));border-color:var(--gold);transform:translateY(-1px);box-shadow:0 3px 8px rgba(200,146,42,.2);}
    .item-btn.selected{background:linear-gradient(135deg,var(--terracotta),var(--dusty-rose));border-color:var(--terracotta);color:white;box-shadow:0 3px 10px rgba(196,113,74,.35);}
    .item-btn.taken{background:rgba(200,200,200,.2);border-color:rgba(150,150,150,.1);color:#c0b0a0;cursor:not-allowed;text-decoration:line-through;font-size:.7rem;}
    .selected-preview{display:none;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(135deg,rgba(200,146,42,.09),rgba(201,139,133,.09));border:1.5px dashed rgba(200,146,42,.36);border-radius:10px;font-size:.85rem;color:var(--brown);font-family:'Lato',sans-serif;margin-bottom:10px;}
    .preview-item{font-weight:700;color:var(--terracotta);}
    .clear-btn{margin-left:auto;color:var(--terracotta);font-size:.75rem;font-weight:700;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;transition:background .2s;}
    .clear-btn:hover{background:rgba(196,113,74,.1);}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--terracotta),var(--dusty-rose));color:white;border:none;border-radius:12px;font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .3s ease;box-shadow:0 4px 18px rgba(196,113,74,.35);letter-spacing:.5px;}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(196,113,74,.45);}
    .submit-btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
    .invite-card{animation:fadeUp .7s ease both;}
    .rsvp-card{animation:fadeUp .5s ease both;}

    /* ── RSVP MINI SUN ── */
    .rsvp-sun-scene{width:110px;height:80px;margin:0 auto 8px;position:relative;overflow:visible;}
    .rsvp-sun-body{
      position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
      width:60px;height:60px;border-radius:50%;
      background:radial-gradient(circle at 42% 42%,#fff5c0 0%,#ffd84a 25%,#f5a820 55%,#e07810 80%,#c85c08 100%);
      box-shadow:0 0 18px 6px rgba(245,168,32,.5),0 0 36px 12px rgba(240,140,20,.22);
      animation:sunPulse 5s ease-in-out infinite;z-index:2;
    }
    .rsvp-sun-rays{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:60px;height:60px;z-index:1;animation:raysRotate 18s linear infinite;}
    .rsvp-ray{position:absolute;bottom:50%;left:50%;transform-origin:0 0;width:40px;height:3.5px;border-radius:2px;background:linear-gradient(90deg,rgba(255,210,70,.8),transparent);}
    .rsvp-sun-clouds{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:130px;height:36px;z-index:3;}
    .rsc{position:absolute;background:rgba(255,253,248,.97);border-radius:50%;}
    .rsc1{width:48px;height:34px;bottom:-5px;left:-2px;}
    .rsc2{width:38px;height:28px;bottom:2px;left:28px;}
    .rsc3{width:44px;height:32px;bottom:-3px;left:54px;}
    .rsc4{width:36px;height:26px;bottom:3px;left:82px;}
    .rsc5{width:40px;height:30px;bottom:-4px;left:104px;}
  </style>
</head>
<body>

<!-- SKY -->
<div class="sky-bg"></div>

<!-- FULL SUN (fixed background) -->
<div class="sun-container">
  <div class="sun-rays-wrap" style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:220px;height:220px;z-index:1;animation:raysRotate 20s linear infinite;">
    <div class="ray" style="transform:rotate(0deg)"></div>
    <div class="ray" style="transform:rotate(20deg)"></div>
    <div class="ray" style="transform:rotate(40deg)"></div>
    <div class="ray" style="transform:rotate(60deg)"></div>
    <div class="ray" style="transform:rotate(80deg)"></div>
    <div class="ray" style="transform:rotate(100deg)"></div>
    <div class="ray" style="transform:rotate(120deg)"></div>
    <div class="ray" style="transform:rotate(140deg)"></div>
    <div class="ray" style="transform:rotate(160deg)"></div>
    <div class="ray" style="transform:rotate(180deg)"></div>
    <div class="ray" style="transform:rotate(200deg)"></div>
    <div class="ray" style="transform:rotate(220deg)"></div>
    <div class="ray" style="transform:rotate(240deg)"></div>
    <div class="ray" style="transform:rotate(260deg)"></div>
    <div class="ray" style="transform:rotate(280deg)"></div>
    <div class="ray" style="transform:rotate(300deg)"></div>
    <div class="ray" style="transform:rotate(320deg)"></div>
    <div class="ray" style="transform:rotate(340deg)"></div>
  </div>
  <div class="sun-body"></div>
</div>

<!-- DRIFTING CLOUDS -->
<div class="clouds-layer">
  <div class="cld cl1 cloud-big"><div class="cld-shape"></div></div>
  <div class="cld cl2 cloud-sm"><div class="cld-shape"></div></div>
  <div class="cld cl3 cloud-med"><div class="cld-shape"></div></div>
  <div class="cld cl4 cloud-big"><div class="cld-shape"></div></div>
  <div class="cld cl5 cloud-sm"><div class="cld-shape"></div></div>
  <div class="cld cl6 cloud-med"><div class="cld-shape"></div></div>
  <div class="cld cl7 cloud-big"><div class="cld-shape"></div></div>
  <div class="cld cl8 cloud-sm"><div class="cld-shape"></div></div>
  <div class="cld cl9 cloud-med"><div class="cld-shape"></div></div>
  <div class="cld cl10 cloud-big"><div class="cld-shape"></div></div>
  <div class="cld cl11 cloud-sm"><div class="cld-shape"></div></div>
</div>

<!-- FLOATING PARTICLES -->

<script>
// Navigation
function goToPage2(){document.getElementById('page1').classList.remove('active');document.getElementById('page2').classList.add('active');window.scrollTo(0,0);}
function goToPage1(){document.getElementById('page2').classList.remove('active');document.getElementById('page1').classList.add('active');window.scrollTo(0,0);}

// Floating particles
(function(){
  const container=document.getElementById('particles');
  const colors=['rgba(200,146,42,.4)','rgba(201,139,133,.4)','rgba(125,155,118,.4)','rgba(196,113,74,.3)','rgba(255,210,80,.4)'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=Math.random()*6+3;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*12}s;`;
    container.appendChild(p);
  }
})();

// RSVP logic
function makeItems(label,count){return Array.from({length:count},(_,i)=>({key:label+'__'+i,label:label}));}
const itemsData={rn:makeItems('Fralda RN',5),p:makeItems('Fralda P',13),m:makeItems('Fralda M',25),g:makeItems('Fralda G',7)};
const catState={rn:false,p:false,m:false,g:false};
let selectedItem=null,selectedLabel=null,itensOcupados=[];
const form=document.getElementById('form'),confirmBtn=document.getElementById('confirm-btn'),erroEl=document.getElementById('erro');
function toggleCat(cat){catState[cat]=!catState[cat];document.getElementById('panel-'+cat).classList.toggle('open',catState[cat]);document.getElementById('arrow-'+cat).classList.toggle('open',catState[cat]);}
function updateCounts(){const t={rn:5,p:13,m:25,g:7};for(const[cat,total]of Object.entries(t)){const livres=itemsData[cat].filter(i=>!itensOcupados.includes(i.key)).length;const el=document.getElementById('count-'+cat);if(!el)continue;el.textContent=livres===0?'Esgotado 🚫':livres+' de '+total+' vagas';el.style.color=livres===0?'#e57373':'#a08060';}}
function clearSelection(){selectedItem=null;selectedLabel=null;renderAll();updatePreview();}
function updatePreview(){const preview=document.getElementById('selected-preview'),pt=document.getElementById('preview-text');if(selectedItem){preview.style.display='flex';pt.textContent=selectedLabel;const m={'Fralda RN':'rn','Fralda P':'p','Fralda M':'m','Fralda G':'g'};const cat=m[selectedLabel];if(cat&&catState[cat])toggleCat(cat);}else{preview.style.display='none';}}
function renderCategory(cat,items){const c=document.getElementById('items-'+cat);if(!c)return;c.innerHTML='';items.forEach(item=>{const btn=document.createElement('button');btn.type='button';btn.textContent=item.label;const occ=itensOcupados.includes(item.key),sel=selectedItem===item.key;btn.className='item-btn '+(occ?'taken':sel?'selected':'available');btn.disabled=occ;btn.onclick=()=>{if(occ)return;selectedItem=sel?null:item.key;selectedLabel=sel?null:item.label;renderAll();updatePreview();};c.appendChild(btn);});}
function renderAll(){['rn','p','m','g'].forEach(cat=>renderCategory(cat,itemsData[cat]));updateCounts();}
async function fetchItensOcupados(){try{const res=await fetch('/api/itens-escolhidos');if(!res.ok)throw new Error();const data=await res.json();itensOcupados=data||[];renderAll();}catch(e){renderAll();}}
form.addEventListener('submit',async(e)=>{e.preventDefault();const nome=document.getElementById('nome').value.trim();if(!nome||!selectedItem){erroEl.textContent='Preencha seu nome e escolha uma fralda!';erroEl.style.display='block';return;}confirmBtn.disabled=true;confirmBtn.textContent='Confirmando...';erroEl.style.display='none';try{const res=await fetch('/api/confirmar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,item:[selectedItem]})});const data=await res.json();if(!res.ok)throw new Error(data.error);const nw='5582994041793',msg='Oi! Já fiz minha confirmação no Chá de Fralda do Dante! Escolhi: '+selectedLabel+' 🍼';if(typeof Swal!=='undefined'){Swal.fire({title:'🍼 Confirmado!',html:'<p style="font-family:Lato,sans-serif;color:#5c3d1e;">Obrigada, <b>'+nome+'</b>!<br>Você escolheu: <b>'+selectedLabel+'</b><br><br>Você será redirecionada para o WhatsApp 💛</p>',icon:'success',confirmButtonColor:'#c4714a',confirmButtonText:'Ir para o WhatsApp 🌿',background:'#fdf8f0',iconColor:'#7d9b76'}).then(()=>window.open('https://wa.me/'+nw+'?text='+encodeURIComponent(msg),'_blank'));}else{alert('Obrigada, '+nome+'!');window.open('https://wa.me/'+nw+'?text='+encodeURIComponent(msg),'_blank');}document.getElementById('nome').value='';selectedItem=null;selectedLabel=null;updatePreview();fetchItensOcupados();}catch(err){erroEl.textContent=err.message||'Erro ao enviar. Tente novamente!';erroEl.style.display='block';}finally{confirmBtn.disabled=false;confirmBtn.textContent='🍼 Confirmar Presença';}});
fetchItensOcupados();
</script>
