<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chá de Fralda 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --cream: #f5ede0;
      --warm: #e8d5b7;
      --sage: #8a9e7e;
      --terracotta: #c4714a;
      --brown: #6b4226;
      --dusty-rose: #c98b85;
      --gold: #b8860b;
      --dark: #3d2b1f;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--cream);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Boho Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(196,113,74,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(138,158,126,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(201,139,133,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Boho texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4714a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--brown);
      text-shadow: 1px 2px 4px rgba(107,66,38,0.15);
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--terracotta);
    }

    .card {
      background: rgba(255, 252, 245, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(196,113,74,0.2);
      border-radius: 20px;
      box-shadow:
        0 4px 24px rgba(107,66,38,0.1),
        inset 0 1px 0 rgba(255,255,255,0.8);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--terracotta), var(--dusty-rose), var(--sage), var(--terracotta));
    }

    /* Boho decorative elements */
    .boho-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 16px;
    }

    .boho-divider::before,
    .boho-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--terracotta), transparent);
    }

    .boho-icon {
      color: var(--terracotta);
      font-size: 1.1rem;
    }

    /* Item buttons */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }

    .item-btn {
      padding: 8px 5px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      line-height: 1.3;
    }

    .item-btn.available {
      background: linear-gradient(135deg, rgba(232,213,183,0.5), rgba(245,237,224,0.9));
      border-color: rgba(196,113,74,0.25);
      color: var(--brown);
    }

    .item-btn.available:hover {
      background: linear-gradient(135deg, rgba(196,113,74,0.15), rgba(201,139,133,0.2));
      border-color: var(--terracotta);
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(196,113,74,0.2);
    }

    .item-btn.selected {
      background: linear-gradient(135deg, var(--terracotta), var(--dusty-rose));
      border-color: var(--terracotta);
      color: white;
      box-shadow: 0 3px 10px rgba(196,113,74,0.35);
    }

    .item-btn.taken {
      background: rgba(200,200,200,0.25);
      border-color: rgba(150,150,150,0.15);
      color: #bbb;
      cursor: not-allowed;
      text-decoration: line-through;
      font-size: 0.7rem;
    }

    /* Category labels */
    .cat-label {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--terracotta);
      margin-bottom: 8px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Input */
    input[type="text"] {
      background: rgba(245,237,224,0.8);
      border: 1.5px solid rgba(196,113,74,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      width: 100%;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--dark);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(196,113,74,0.15);
    }

    input[type="text"]::placeholder {
      color: #bfa98a;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--terracotta), var(--dusty-rose));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 18px rgba(196,113,74,0.35);
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(196,113,74,0.45);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Boho floating elements */
    .boho-leaf {
      position: fixed;
      pointer-events: none;
      opacity: 0.07;
      font-size: 5rem;
      z-index: 0;
    }

    /* Per-category collapsible blocks */
    .cat-block {
      border: 1.5px solid rgba(196,113,74,0.2);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,252,245,0.6);
      transition: box-shadow 0.2s;
    }
    .cat-block:hover {
      box-shadow: 0 2px 12px rgba(196,113,74,0.1);
    }

    .cat-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 11px 14px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      transition: background 0.2s ease;
      text-align: left;
    }
    .cat-toggle:hover {
      background: rgba(196,113,74,0.06);
    }

    .cat-toggle-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cat-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--brown);
    }

    .cat-count {
      font-size: 0.75rem;
      color: #a0856a;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    .cat-arrow {
      font-size: 0.72rem;
      color: var(--terracotta);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    .cat-arrow.open { transform: rotate(180deg); }

    .cat-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      padding: 0 12px;
    }
    .cat-panel.open {
      max-height: 600px;
      opacity: 1;
      padding: 0 12px 10px;
    }

    /* Tags para categorias */
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tag-rn { background: rgba(184,134,11,0.15); color: var(--gold); border: 1px solid rgba(184,134,11,0.3); }
    .tag-p  { background: rgba(201,139,133,0.15); color: var(--dusty-rose); border: 1px solid rgba(201,139,133,0.3); }
    .tag-m  { background: rgba(138,158,126,0.15); color: var(--sage); border: 1px solid rgba(138,158,126,0.3); }
    .tag-g  { background: rgba(196,113,74,0.15); color: var(--terracotta); border: 1px solid rgba(196,113,74,0.3); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeIn 0.6s ease both; }

    label {
      color: var(--brown);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- Decorative leaves -->
<span class="boho-leaf" style="top:5%;left:2%;transform:rotate(-20deg)">🌿</span>
<span class="boho-leaf" style="top:40%;right:1%;transform:rotate(15deg)">🍃</span>
<span class="boho-leaf" style="bottom:10%;left:3%;transform:rotate(10deg)">🌾</span>
<span class="boho-leaf" style="bottom:30%;right:2%;transform:rotate(-25deg)">🌿</span>

<div class="container flex items-center justify-center min-h-screen p-4 py-10">
  <div class="card w-full max-w-lg p-7 sm:p-10">

    <!-- Header -->
    <div class="text-center mb-2">
      <div style="font-size:2.5rem; letter-spacing:4px; color:var(--sage); opacity:0.7; margin-bottom:6px">🌿 🍼 🌿</div>
      <h1 class="text-4xl sm:text-5xl font-bold leading-tight">Chá de Fralda</h1>
      <p class="subtitle text-lg mt-1">uma festa cheia de amor</p>
    </div>

    <div class="boho-divider mt-4">
      <span class="boho-icon">✦</span>
    </div>

    <p class="text-center text-sm mb-1" style="color:var(--brown); font-family:'Lato', sans-serif;">
      Digite seu nome e escolha sua fralda 💛
    </p>
    <p class="text-center text-xs mb-6" style="color:#a0856a; font-family:'Playfair Display', serif; font-style:italic;">
      Cada convidada contribui com um pacotinho de fraldas para a mamãe e o bebê!
    </p>

    <form id="form" class="space-y-5">
      <div>
        <label for="nome">Seu nome</label>
        <input type="text" id="nome" placeholder="Ex: Maria da Silva" required>
      </div>

      <div>
        <label style="display:block; margin-bottom:8px;">Escolha sua fralda 🌸</label>

        <!-- Preview do item selecionado -->
        <div id="selected-preview" style="display:none; align-items:center; gap:8px; padding:10px 14px; background:linear-gradient(135deg,rgba(196,113,74,0.1),rgba(201,139,133,0.12)); border:1.5px dashed rgba(196,113,74,0.4); border-radius:10px; font-size:0.85rem; color:var(--brown); font-family:'Lato',sans-serif; margin-bottom:10px;">
          ✔ Selecionado: <span id="preview-text" style="font-weight:700; color:var(--terracotta);"></span>
          <button type="button" onclick="clearSelection()" style="margin-left:auto; color:var(--terracotta); font-size:0.85rem; font-weight:700; background:none; border:none; cursor:pointer;">✕ trocar</button>
        </div>

        <!-- Categorias recolhíveis individualmente -->
        <div class="space-y-2" id="categories-wrap">

          <!-- RN -->
          <div class="cat-block">
            <button type="button" class="cat-toggle" onclick="toggleCat('rn')">
              <div class="cat-toggle-left">
                <span class="tag tag-rn">RN</span>
                <span class="cat-name">Recém-nascido</span>
                <span class="cat-count" id="count-rn">5 vagas</span>
              </div>
              <span class="cat-arrow" id="arrow-rn">▼</span>
            </button>
            <div class="cat-panel" id="panel-rn">
              <div id="items-rn" class="items-grid pt-2 pb-1"></div>
            </div>
          </div>

          <!-- P -->
          <div class="cat-block">
            <button type="button" class="cat-toggle" onclick="toggleCat('p')">
              <div class="cat-toggle-left">
                <span class="tag tag-p">P</span>
                <span class="cat-name">Tamanho Pequeno</span>
                <span class="cat-count" id="count-p">13 vagas</span>
              </div>
              <span class="cat-arrow" id="arrow-p">▼</span>
            </button>
            <div class="cat-panel" id="panel-p">
              <div id="items-p" class="items-grid pt-2 pb-1"></div>
            </div>
          </div>

          <!-- M -->
          <div class="cat-block">
            <button type="button" class="cat-toggle" onclick="toggleCat('m')">
              <div class="cat-toggle-left">
                <span class="tag tag-m">M</span>
                <span class="cat-name">Tamanho Médio</span>
                <span class="cat-count" id="count-m">25 vagas</span>
              </div>
              <span class="cat-arrow" id="arrow-m">▼</span>
            </button>
            <div class="cat-panel" id="panel-m">
              <div id="items-m" class="items-grid pt-2 pb-1"></div>
            </div>
          </div>

          <!-- G -->
          <div class="cat-block">
            <button type="button" class="cat-toggle" onclick="toggleCat('g')">
              <div class="cat-toggle-left">
                <span class="tag tag-g">G</span>
                <span class="cat-name">Tamanho Grande</span>
                <span class="cat-count" id="count-g">7 vagas</span>
              </div>
              <span class="cat-arrow" id="arrow-g">▼</span>
            </button>
            <div class="cat-panel" id="panel-g">
              <div id="items-g" class="items-grid pt-2 pb-1"></div>
            </div>
          </div>

        </div>
      </div>

      <p id="erro" class="text-red-500 text-sm hidden font-semibold text-center" style="font-family:'Lato'"></p>

      <button type="submit" id="confirm" class="submit-btn">
        Confirmar Presença 🌿
      </button>
    </form>

  </div>
</div>

<script>
// Cada item tem key única (usada internamente) e label exibido
function makeItems(label, count) {
  return Array.from({length: count}, (_, i) => ({
    key: `${label}__${i}`,
    label: label
  }));
}

const itemsData = {
  rn: makeItems("Fralda RN", 5),
  p:  makeItems("Fralda P",  13),
  m:  makeItems("Fralda M",  25),
  g:  makeItems("Fralda G",  7),
};

const catState = { rn: false, p: false, m: false, g: false };

let selectedItem = null;
let selectedLabel = null;
let itensOcupados = [];

const form = document.getElementById("form");
const confirmBtn = document.getElementById("confirm");
const erro = document.getElementById("erro");

function toggleCat(cat) {
  catState[cat] = !catState[cat];
  document.getElementById(`panel-${cat}`).classList.toggle("open", catState[cat]);
  document.getElementById(`arrow-${cat}`).classList.toggle("open", catState[cat]);
}

function updateCounts() {
  const cats = { rn: 5, p: 13, m: 25, g: 7 };
  for (const [cat, total] of Object.entries(cats)) {
    const items = itemsData[cat];
    const livres = items.filter(i => !itensOcupados.includes(i)).length;
    const el = document.getElementById(`count-${cat}`);
    if (el) {
      el.textContent = livres === 0 ? "Esgotado 🚫" : `${livres} de ${total} vagas`;
      el.style.color = livres === 0 ? "#e57373" : "#a0856a";
    }
  }
}

function clearSelection() {
  selectedItem = null;
  selectedLabel = null;
  renderAll();
  updatePreview();
}

function updatePreview() {
  const preview = document.getElementById("selected-preview");
  const previewText = document.getElementById("preview-text");
  if (selectedItem) {
    preview.style.display = "flex";
    previewText.textContent = selectedLabel;
    const cat = selectedItem.includes("RN") ? "rn" : selectedItem.includes("__P") ? "p" : selectedItem.includes("__M") ? "m" : "g";
    if (catState[cat]) toggleCat(cat);
  } else {
    preview.style.display = "none";
  }
}

function renderCategory(cat, items) {
  const container = document.getElementById("items-" + cat);
  container.innerHTML = "";
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = item.label;
    const ocupado = itensOcupados.includes(item.key);
    const selecionado = selectedItem === item.key;
    btn.className = "item-btn " + (ocupado ? "taken" : selecionado ? "selected" : "available");
    btn.disabled = ocupado;
    btn.onclick = () => {
      if (ocupado) return;
      selectedItem = selecionado ? null : item.key;
      selectedLabel = selecionado ? null : item.label;
      renderAll();
      updatePreview();
    };
    container.appendChild(btn);
  });
}

function renderAll() {
  renderCategory("rn", itemsData.rn);
  renderCategory("p",  itemsData.p);
  renderCategory("m",  itemsData.m);
  renderCategory("g",  itemsData.g);
  updateCounts();
}

async function fetchItensOcupados() {
  try {
    const res = await fetch("/api/itens-escolhidos");
    if (!res.ok) throw new Error();
    const data = await res.json();
    itensOcupados = data || [];
    renderAll();
  } catch (err) {
    console.error("Erro ao buscar itens:", err);
    erro.textContent = "Não foi possível carregar a lista. Verifique se o servidor está rodando.";
    erro.classList.remove("hidden");
    renderAll();
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const nome = document.getElementById("nome").value.trim();
  if (!nome || !selectedItem) {
    erro.textContent = "Preencha seu nome e escolha um item!";
    erro.classList.remove("hidden");
    return;
  }

  confirmBtn.disabled = true;
  confirmBtn.textContent = "Confirmando...";
  erro.classList.add("hidden");

  try {
    const res = await fetch("/api/confirmar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome, item: [selectedItem] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    if (typeof Swal !== "undefined") {
      Swal.fire({
        title: '🌿 Confirmado!',
        html: `<p style="font-family:'Lato',sans-serif; color:#6b4226;">Obrigada, <b>${nome}</b>!<br>Você escolheu: <b>${selectedLabel}</b><br><br>Você será redirecionada para o WhatsApp 💛</p>`,
        icon: 'success',
        confirmButtonColor: '#c4714a',
        confirmButtonText: 'Ir para o WhatsApp 🌿',
        background: '#fdf8f0',
        iconColor: '#8a9e7e',
      }).then(() => {
        const numeroWhats = "5582994041793";
        const msg = `Oi! Já fiz minha confirmação no Chá de Fralda! Escolhi: ${selectedLabel} 🍼`;
        window.open(`https://wa.me/${numeroWhats}?text=${encodeURIComponent(msg)}`, "_blank");
      });
    } else {
      alert(`Obrigada, ${nome}! Você escolheu: ${selectedLabel}`);
      const numeroWhats = "5582994041793";
      const msg = `Oi! Já fiz minha confirmação no Chá de Fralda! Escolhi: ${selectedLabel} 🍼`;
      window.open(`https://wa.me/${numeroWhats}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    document.getElementById("nome").value = "";
    selectedItem = null;
    selectedLabel = null;
    updatePreview();
    fetchItensOcupados();
  } catch (err) {
    erro.textContent = err.message || "Erro ao enviar. Tente novamente!";
    erro.classList.remove("hidden");
    console.error(err);
  } finally {
    confirmBtn.disabled = false;
    confirmBtn.textContent = "Confirmar Presença 🌿";
  }
});

fetchItensOcupados();
</script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
